[build]
# Disable Subresource Integrity (SRI) to fix the browser blocking error "Failed to find a valid digest"
# This prevents browsers from blocking the app if JS/WASM files change slightly (e.g. on CDN/Vercel).
no_sri = true

[[hooks]]
stage = "post_build"
command = "uv"
command_arguments = ["run", "../scripts/generate_pwa_sw.py"]
