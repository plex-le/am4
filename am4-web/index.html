<!DOCTYPE html>
<html lang="en">

<head>
    <title>AM4Help</title>
    <meta charset="UTF-8">
    <meta name="description" content="Tools and utilities for the game Airline Manager 4.">

    <!-- ensure we get quick html updates -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link data-trunk rel="rust" data-wasm-opt="s" data-reference-types="true" />
    <link data-trunk rel="scss" href="src/app.module.scss" />
    <link data-trunk rel="copy-dir" href="../am4/assets" />
    <link data-trunk rel="copy-file" href="manifest.json" />
    <link data-trunk rel="copy-file" href="sw.js" />
    <link rel="icon" href="assets/img/logo-32.webp" sizes="32x32" />
    <link rel="icon" href="assets/img/logo-64.webp" sizes="64x64" />
    <link rel="icon" href="assets/img/logo-500.webp" sizes="500x500" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#383338" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .catch(e => console.error('sw registration failed', e));
        }
    </script>
</head>

<body>
</body>

</html>
